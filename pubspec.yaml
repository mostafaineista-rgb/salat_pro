name: salat_pro
description: "A premium Digital Sanctuary for prayer times, Qibla, and spiritual growth."
version: 1.0.1+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Core Logic
  adhan: 2.0.0+1
  geolocator: ^14.0.2
  geocoding: ^3.0.0
  hijri: ^3.0.0
  http: ^1.2.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.1
  
  # UI & UX
  flutter_qiblah: ^3.2.0
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  
  # State & Utils
  provider: ^6.1.2
  permission_handler: ^11.3.1
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  path: ^1.9.0
  
  # Notifications
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4
  audioplayers: ^6.1.0
  package_info_plus: ^9.0.1
  app_installer: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/images/
    - assets/sounds/

# Master must be square (e.g. 1024×1024). Non-square sources are distorted by flutter_launcher_icons.
# Regenerate launcher assets: dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: assets/images/app_icon.png
  android: true
  ios: false
  min_sdk_android: 21
  adaptive_icon_background: "#0D1514"
  adaptive_icon_foreground: assets/images/app_icon.png
  web:
    generate: true
    background_color: "#0D1514"
    theme_color: "#1E5649"
  windows:
    generate: true
